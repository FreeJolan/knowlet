<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Knowlet — New surfaces</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; background: #131418; color: #dcdee5; font-family: "Inter", system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="new-1-map.jsx"></script>
<script type="text/babel" src="new-2-digest.jsx"></script>
<script type="text/babel" src="new-3-dark.jsx"></script>

<script type="text/babel" data-presets="react">
const App = () => (
  <DesignCanvas
    title="Knowlet — New surfaces (B 类:全新表面)"
    subtitle="3 个新表面 · 知识图 focus / 周报阅读视图 / 主题切换 · 每个都基于现有的 4-pane 编辑器和七色 token 体系"
  >
    <DCSection id="map" title="知识图 · 信号面板(focus mode · ⌘⇧M)">
      <DCArtboard id="map-focus" label="09 · Knowledge map — 4 列 signal,不画图,只列结构问题" width={1440} height={880}>
        <KnowledgeMapScreen />
      </DCArtboard>
    </DCSection>

    <DCSection id="digest" title="周报 · 阅读视图(narrative,不是 dashboard)">
      <DCArtboard id="digest-read" label="10 · Weekly digest — Source Serif 4 长读体,signal 串成叙事 + 底部 cadence" width={1440} height={920}>
        <DigestScreen />
      </DCArtboard>
    </DCSection>

    <DCSection id="dark" title="主题切换 · 设置主入口 + ⌘K 次入口(top bar 不占地)">
      <DCArtboard id="dark-toggle" label="11 · Dark toggle — 设置面板 + ⌘K 命令片段 + 七色 token 镜像表" width={1440} height={920}>
        <DarkToggleScreen />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
