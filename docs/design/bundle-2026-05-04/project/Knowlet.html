<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Knowlet — UI v2</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; background: #131418; color: #dcdee5; font-family: "Inter", system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="screen-home.jsx"></script>
<script type="text/babel" src="screen-home-expanded.jsx"></script>
<script type="text/babel" src="screen-drafts.jsx"></script>
<script type="text/babel" src="screen-cards.jsx"></script>
<script type="text/babel" src="screen-palette.jsx"></script>

<script type="text/babel" data-presets="react">
const App = () => (
  <DesignCanvas
    title="Knowlet — v2"
    subtitle="按 ADR-0011 重做 · 笔记本位三栏 · AI 默认折叠 · dusk 蓝 #8aa9c9"
  >
    <DCSection id="primary" title="主界面 · 笔记本位">
      <DCArtboard id="home" label="01 · Home — 三栏 · AI 折叠到右栏 rail" width={1440} height={900}>
        <HomeScreen />
      </DCArtboard>
      <DCArtboard id="home-expanded" label="01b · Home — AI 右栏展开" width={1440} height={900}>
        <HomeExpandedScreen />
      </DCArtboard>
    </DCSection>

    <DCSection id="focus" title="Focus modes · 工作流全屏">
      <DCArtboard id="drafts" label="02 · 草稿审查 — Cmd+Shift+D" width={1280} height={820}>
        <DraftsScreen />
      </DCArtboard>
      <DCArtboard id="cards" label="03 · 卡片复习 — Cmd+Shift+R" width={1280} height={820}>
        <CardsScreen />
      </DCArtboard>
    </DCSection>

    <DCSection id="overlay" title="主导航">
      <DCArtboard id="palette" label="04 · ⌘K 命令面板" width={1280} height={820}>
        <PaletteScreen />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
